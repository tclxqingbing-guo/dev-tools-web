services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: backend-runtime
    container_name: devtools-backend
    restart: unless-stopped
    # Load .env into the container so names like AI_API_KEY-CHAT work. Compose
    # ${VAR:-} interpolation does not treat hyphens as part of VAR, so
    # ${AI_API_KEY-CHAT:-} becomes the literal "CHAT:-".
    env_file:
      - .env
    environment:
      - BACKEND_PORT=3001
    volumes:
      - /opt/data/dev_tools:/app/data
    networks:
      - devtools

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: frontend-runtime
    container_name: devtools-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8866}:80"
    depends_on:
      - backend
    networks:
      - devtools

volumes:
  backend-data:

networks:
  devtools:
    driver: bridge
